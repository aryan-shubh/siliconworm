name: Python SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk/python/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "sdk/python/**"
      - ".github/workflows/ci-python.yml"

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Lint with ruff
        run: uv tool run ruff check siliconworm examples

      - name: Build sdist + wheel
        run: uv build

      - name: Verify metadata
        run: uv tool run twine check --strict dist/*

      - name: Smoke-test installed package end-to-end
        # Install the freshly built wheel into a fresh env, run the quickstart,
        # confirm all four run files appear and the metric count looks right.
        run: |
          set -e
          uv run --no-project --python ${{ matrix.python-version }} \
            --with siliconworm --find-links dist \
            python examples/quickstart.py
          RUN=$(ls -t ~/.siliconworm/runs | head -1)
          for f in config.json metrics.jsonl summary.json system.json; do
            test -s ~/.siliconworm/runs/"$RUN"/"$f" || { echo "missing $f"; exit 1; }
            echo "ok  $f"
          done
          LINES=$(wc -l < ~/.siliconworm/runs/"$RUN"/metrics.jsonl)
          test "$LINES" -gt 100 || { echo "expected >100 metric lines, got $LINES"; exit 1; }
          echo "metrics.jsonl: $LINES lines"
