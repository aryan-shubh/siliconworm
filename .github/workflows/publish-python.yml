name: Publish Python SDK

# Triggered when a GitHub release tagged `sdk-python-v*` is published.
# The trusted-publisher config on PyPI must reference this workflow file
# (one-time setup: https://docs.pypi.org/trusted-publishers/).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  # ───────────────── build sdist + wheel ─────────────────
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'sdk-python-v') }}
    name: Build distributions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify metadata with twine
        run: python -m twine check --strict dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk/python/dist/*

  # ───────────────── publish to TestPyPI ─────────────────
  # Runs on `workflow_dispatch` with target=testpypi. Lets you smoke-test the
  # full release flow before pushing to real PyPI.
  publish-testpypi:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/siliconworm/
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  # ───────────────── publish to PyPI ─────────────────
  publish-pypi:
    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'sdk-python-v')) || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/siliconworm/
    permissions:
      id-token: write  # required for trusted publishing — no API token needed
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
