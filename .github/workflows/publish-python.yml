name: Publish Python SDK

# Triggered when a GitHub release tagged `sdk-python-v*` is published.
# Uses uv for both build and publish. uv auto-detects GitHub Actions OIDC
# and uses PyPI Trusted Publishing — no API tokens stored as secrets.
# (One-time setup: https://docs.pypi.org/trusted-publishers/.)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  # ───────────────── build sdist + wheel ─────────────────
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'sdk-python-v') }}
    name: Build distributions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Verify metadata
        run: uv tool run twine check --strict dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk/python/dist/*

  # ───────────────── publish to TestPyPI ─────────────────
  # Manual `workflow_dispatch` with target=testpypi — for dress-rehearsing
  # the release flow before pushing to real PyPI.
  publish-testpypi:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/siliconworm/
    permissions:
      id-token: write  # OIDC for trusted publishing
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: sdk/python/dist

      - name: Publish to TestPyPI
        run: uv publish --index testpypi

  # ───────────────── publish to PyPI ─────────────────
  publish-pypi:
    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'sdk-python-v')) || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/siliconworm/
    permissions:
      id-token: write  # OIDC for trusted publishing
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: sdk/python/dist

      - name: Publish to PyPI
        run: uv publish
